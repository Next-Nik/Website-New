<style>
.pp-auth-overlay{position:fixed;inset:0;z-index:3000;background:rgba(15,21,35,0.55);display:flex;align-items:center;justify-content:center;padding:24px;}
.pp-auth-card{background:#FFFFFF;border:1.5px solid rgba(200,146,42,0.78);border-radius:14px;padding:40px 36px 36px;max-width:400px;width:100%;font-family:'Cormorant Garamond',Georgia,serif;}

<script>
function showPPAuthModal() {
  if (document.getElementById('pp-auth-overlay')) return;
  var returnUrl = encodeURIComponent(window.location.href);
  var overlay = document.createElement('div');
  overlay.id = 'pp-auth-overlay';
  overlay.className = 'pp-auth-overlay';
  overlay.innerHTML = '<div class="pp-auth-card">' +
    '<span class="pp-auth-eyebrow">Purpose Piece</span>' +
    '<h2 class="pp-auth-heading">Sign in to begin.</h2>' +
    '<p class="pp-auth-body">Your archetype and contribution pattern are saved to your profile.</p>' +
    '<a href="https://nextus.world/login.html?redirect=' + returnUrl + '" class="pp-auth-btn">Sign in or create account →</a>' +
    '</div>';
  document.body.appendChild(overlay);
}

window.addEventListener("lifeos:auth", function(e) {
  var u = e.detail && e.detail.user;
  var d = document.getElementById("nk-profile-dot");
  if (u) {
    if (d) {
      var i = ((u.email||"").split("@")[0].charAt(0)||"?").toUpperCase();
      d.textContent = i;
      d.href = "https://nextus.world/profile.html";
      d.title = "Your profile";
      d.style.display = "flex";
    }
    if (window.App) App.startConversation();
  } else {
    try { localStorage.removeItem('sb-tphbpwzozkskytoichho-auth-token'); } catch(e) {}
    showPPAuthModal();
  }
}, { once: true });
</script>
