<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Compass circle -->
  <circle cx="16" cy="16" r="14" stroke="#C8922A" stroke-width="1.5" fill="none"/>
  <!-- Compass needle — vertical line -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#C8922A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Compass needle — horizontal line -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#C8922A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="2" fill="#C8922A"/>
  <!-- North pointer -->
  <polygon points="16,5 14.5,14 16,12 17.5,14" fill="#C8922A"/>
</svg>
