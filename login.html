<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — NextUs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant+SC:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: #FFFFFF;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: #0F1523;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Logo + wordmark ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 48px;
    }

    .brand img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    .brand-name {
      font-family: 'Cormorant SC', serif;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: rgba(15,21,35,0.45);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: #FFFFFF;
      border: 1.5px solid rgba(200,146,42,0.78);
      border-radius: 14px;
      padding: 40px 36px 36px;
    }

    .card-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: #0F1523;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .card-sub {
      font-size: 14px;
      font-style: italic;
      color: rgba(15,21,35,0.45);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(200,146,42,0.20);
    }

    .divider-text {
      font-family: 'Cormorant SC', serif;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: rgba(15,21,35,0.35);
    }

    /* ── Email form ── */
    .email-label {
      font-family: 'Cormorant SC', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.20em;
      color: #C8922A;
      display: block;
      margin-bottom: 8px;
    }

    .email-input {
      width: 100%;
      padding: 13px 16px;
      background: #FFFFFF;
      border: 1.5px solid rgba(200,146,42,0.78);
      border-radius: 40px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: #0F1523;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }

    .email-input:focus {
      border-color: rgba(200,146,42,1);
      background: #FFFFFF;
    }

    .email-input::placeholder {
      color: rgba(15,21,35,0.3);
      font-style: italic;
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: rgba(200,146,42,0.05);
      border: 1.5px solid rgba(200,146,42,0.78);
      border-radius: 40px;
      font-family: 'Cormorant SC', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: #C8922A;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(15,21,35,0.08); border-color: rgba(200,146,42,1); background: rgba(200,146,42,0.08); }
    .btn-primary:disabled { opacity: 0.5; cursor: wait; transform: none; box-shadow: none; }

        .btn-social {
      width: 100%;
      padding: 13px 16px;
      background: rgba(200,146,42,0.05);
      border: 1.5px solid rgba(200,146,42,0.78);
      border-radius: 40px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      color: #0F1523;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
    }

    .btn-social:hover {
      border-color: rgba(200,146,42,1);
      background: rgba(200,146,42,0.05);
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── States ── */
    .state { display: none; }
    .state.active { display: block; }

    /* Success state */
    .success-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(200,146,42,0.1);
      border: 1.5px solid rgba(200,146,42,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 22px;
    }

    .success-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      color: #0F1523;
      text-align: center;
      margin-bottom: 10px;
    }

    .success-body {
      font-size: 14px;
      font-style: italic;
      color: rgba(15,21,35,0.5);
      text-align: center;
      line-height: 1.6;
    }

    .success-email {
      font-style: normal;
      color: #C8922A;
    }

    /* Error */
    .error-msg {
      display: none;
      font-size: 13px;
      font-style: italic;
      color: rgba(15,21,35,0.78);
      margin-top: 8px;
      padding: 10px 14px;
      background: rgba(200,146,42,0.05);
      border-radius: 14px;
      border: 1.5px solid rgba(200,146,42,0.35);
    }

    /* ── Footer ── */
    .page-footer {
      margin-top: 32px;
      font-family: 'Cormorant SC', serif;
      font-size: 13px;
      letter-spacing: 0.14em;
      color: rgba(15,21,35,0.3);
      text-align: center;
    }

    .page-footer a {
      color: rgba(200,146,42,0.7);
      text-decoration: none;
    }

    @media (max-width: 440px) {
      .card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="brand">
    <img src="/logo_nav.png" alt="NextUs" onerror="this.style.display='none'">
    <span class="brand-name">NextUs</span>
  </div>

  <div class="card">

    <!-- Default sign-in state -->
    <div class="state active" id="state-signin">

      <h1 class="card-heading">Welcome.</h1>
      <p class="card-sub">Sign in or create your account to continue.</p>

      <!-- Social sign-in -->
      <button class="btn-social" id="btn-google">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <!-- Apple sign-in — coming soon -->

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>

      <!-- Email magic link -->
      <label class="email-label" for="email-input">Email</label>
      <input
        type="email"
        id="email-input"
        class="email-input"
        placeholder="your@email.com"
        autocomplete="email"
        autocapitalize="none"
      />
      <button class="btn-primary" id="btn-email">Continue with email →</button>
      <div class="error-msg" id="error-msg"></div>

    </div>

    <!-- Magic link sent state -->
    <div class="state" id="state-sent">
      <div class="success-icon">✦</div>
      <h2 class="success-heading">Check your email.</h2>
      <p class="success-body">
        We sent a sign-in link to<br>
        <span class="success-email" id="sent-email"></span>
      </p>
      <p class="success-body" style="margin-top:12px;">Click the link to continue. You can close this tab.</p>
    </div>

  </div>

  <p class="page-footer">
    <a href="/">nextus.world</a>
  </p>

</div>

<script>
  // ── Supabase init ──────────────────────────────────────────────────────────
  const SUPABASE_URL      = "https://tphbpwzozkskytoichho.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_M00GF1FWV5tgKHqmyRCZag_kJjgBJn-";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── Redirect logic ─────────────────────────────────────────────────────────
  // Reads ?redirect= param so users land back where they came from after sign-in
  function getRedirectUrl() {
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get("redirect");
    // Whitelist of allowed redirect domains
    const allowed = [
      "life-os-pulse.vercel.app",
      "life-os-mapping.vercel.app",
      "orienteering-rose.vercel.app",
      "life-os-purpose-piece-v2.vercel.app",
      "life-os-foundation.vercel.app",
      "target-goals.vercel.app",
      "nextus.world"
    ];
    if (redirect) {
      try {
        const url = new URL(redirect);
        if (allowed.some(d => url.hostname.endsWith(d))) return redirect;
      } catch {}
    }
    return "https://nextus.world";
  }

  // ── Check if already signed in ────────────────────────────────────────────
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      window.location.href = getRedirectUrl();
    }
  })();

  // ── Google ─────────────────────────────────────────────────────────────────
  document.getElementById("btn-google").addEventListener("click", async () => {
    const { error } = await sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: getRedirectUrl() }
    });
    if (error) showError(error.message);
  });

  // Apple sign-in — coming soon

  // ── Email magic link ───────────────────────────────────────────────────────
  document.getElementById("btn-email").addEventListener("click", sendMagicLink);
  document.getElementById("email-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMagicLink();
  });

  async function sendMagicLink() {
    const email = document.getElementById("email-input").value.trim();
    if (!email || !email.includes("@")) {
      showError("Please enter a valid email address.");
      return;
    }

    const btn = document.getElementById("btn-email");
    btn.disabled = true;
    btn.textContent = "Sending...";
    hideError();

    const { error } = await sb.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: getRedirectUrl(),
        shouldCreateUser: true
      }
    });

    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = "Continue with email →";
      return;
    }

    // Show success state
    document.getElementById("sent-email").textContent = email;
    document.getElementById("state-signin").classList.remove("active");
    document.getElementById("state-sent").classList.add("active");
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  function hideError() {
    document.getElementById("error-msg").style.display = "none";
  }
</script>

</body>
</html>
