<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@400;600&display=swap" rel="stylesheet">

<style>
/* =============================================
   NEXTUS — Global Design System v2
   Paste as a Raw HTML block at the top of
   every page in Systeme.io.
   ============================================= */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Variables ── */
:root {
  /* Backgrounds */
  --dark:        #080C18;
  --dark-surf:   #0D1121;

  /* Gold system */
  --gold-light:  #E8B84A;   /* buttons, icons on dark */
  --gold-mid:    #df9600;   /* labels on light surfaces */
  --gold-dark:   #A8721A;   /* button border, outlines */
  --gold-rule:   rgba(232,184,74,0.18);
  --gold-faint:  rgba(232,184,74,0.07);

  /* Parchment card system */
  --card-bg:     #FAF8F4;
  --card-title:  #1A1A14;
  --card-sub:    #8C7E6A;
  --card-border: #0E1330;   /* indigo stroke on cards */

  /* On-dark text */
  --d-heading:   rgba(255,255,255,0.92);
  --d-sub:       rgba(255,255,255,0.68);
  --d-meta:      rgba(255,255,255,0.30);

  /* Typography */
  --serif:       'Cormorant Garamond', Georgia, serif;
  --serif-sc:    'Cormorant SC', Georgia, serif;
}

/* ── Base ── */
html, body {
  background: var(--dark) !important;
  color: var(--d-heading);
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ── Page container ── */
.nk-page {
  max-width: 820px;
  margin: 0 auto;
  padding: 72px 32px 100px;
}

/* ── Subtle gold glow — add to hero sections ── */
.nk-glow {
  position: relative;
  overflow: hidden;
}
.nk-glow::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 65% 10%, rgba(232,184,74,0.05) 0%, transparent 65%);
  pointer-events: none;
}

/* ── Nav ── */
.nk-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 48px 32px 0;
  max-width: 820px;
  margin: 0 auto;
}

.nk-logo {
  font-family: var(--serif-sc);
  font-size: 15px;
  letter-spacing: 0.14em;
  color: var(--d-heading);
  text-decoration: none;
}

.nk-hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}
.nk-hamburger span {
  display: block;
  width: 20px;
  height: 1.5px;
  background: rgba(255,255,255,0.45);
  border-radius: 1px;
}

/* ── Gold rule ── */
.nk-rule {
  width: 28px;
  height: 1px;
  background: var(--gold-light);
  opacity: 0.45;
  border: none;
  display: block;
  margin: 0 0 26px;
}

.nk-section-rule {
  border: none;
  border-top: 1px solid var(--gold-rule);
  margin: 64px 0;
}

/* ── Labels / eyebrows ── */
.nk-label {
  font-family: var(--serif-sc);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: var(--gold-light);
  display: block;
  margin-bottom: 14px;
}

/* On parchment cards — darker gold */
.nk-label-dark {
  font-family: var(--serif-sc);
  font-size: 8px;
  letter-spacing: 0.18em;
  color: var(--gold-mid);
  -webkit-text-stroke: 0.4px rgba(10,15,30,0.10);
  display: block;
  margin-bottom: 5px;
}

/* ── Headings ── */
.nk-h1 {
  font-family: var(--serif);
  font-size: clamp(36px, 5.5vw, 64px);
  font-weight: 300;
  color: var(--d-heading);
  line-height: 1.12;
  letter-spacing: -0.01em;
  margin-bottom: 14px;
}

.nk-h1 em {
  font-style: italic;
  color: rgba(232,184,74,0.82);
}

.nk-h2 {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 300;
  color: var(--d-heading);
  line-height: 1.18;
  margin-bottom: 10px;
}

.nk-h3 {
  font-family: var(--serif);
  font-size: clamp(18px, 2.2vw, 24px);
  font-weight: 400;
  color: var(--d-heading);
  line-height: 1.3;
  margin-bottom: 8px;
}

/* ── Body text ── */
.nk-p {
  font-size: clamp(15px, 1.8vw, 18px);
  color: var(--d-sub);
  line-height: 1.75;
  margin-bottom: 18px;
  max-width: 640px;
  font-weight: 300;
}

.nk-sub {
  font-size: clamp(14px, 1.6vw, 16px);
  color: var(--d-sub);
  line-height: 1.65;
  font-style: italic;
  font-weight: 300;
}

.nk-meta {
  font-size: 11px;
  color: var(--gold-light);
  letter-spacing: 0.04em;
}

/* ── Buttons ── */
.nk-btn-gold {
  display: inline-block;
  padding: 14px 32px;
  border-radius: 12px;
  background: var(--gold-light);
  border: 1px solid var(--gold-dark);
  font-family: var(--serif-sc);
  font-size: 11px;
  letter-spacing: 0.16em;
  color: #1A0F00;
  text-decoration: none;
  text-align: center;
  cursor: pointer;
}

.nk-btn-outline {
  display: inline-block;
  padding: 13px 30px;
  border-radius: 40px;
  border: 1px solid rgba(232,184,74,0.40);
  color: rgba(232,184,74,0.88);
  font-family: var(--serif-sc);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-decoration: none;
  text-align: center;
  cursor: pointer;
}

.nk-btn-ghost {
  display: inline-block;
  padding: 13px 30px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.09);
  color: var(--d-meta);
  font-family: var(--serif-sc);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-decoration: none;
  text-align: center;
  cursor: pointer;
}

/* Full-width button variants */
.nk-btn-gold-full  { display: block; width: 100%; }
.nk-btn-ghost-full { display: block; width: 100%; }

/* ── Parchment cards ── */
.nk-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 10px;
  border: 1px solid var(--card-border);
}

.nk-card-title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 400;
  color: var(--card-title);
  margin-bottom: 5px;
}

.nk-card-body {
  font-size: 13px;
  line-height: 1.6;
  font-style: italic;
  color: var(--card-sub);
}

/* ── Option rows (routing question) ── */
.nk-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 16px;
  border-radius: 12px;
  margin-bottom: 9px;
  background: #FFFFFF;
  border: none;
  position: relative;
  text-decoration: none;
  cursor: pointer;
}

/* Glinting gold border */
.nk-option::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 12px;
  padding: 1.5px;
  background: linear-gradient(
    125deg,
    rgba(232,184,74,0.25) 0%,
    rgba(232,184,74,0.9) 35%,
    rgba(245,208,100,1.0) 50%,
    rgba(232,184,74,0.9) 65%,
    rgba(232,184,74,0.25) 100%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.nk-option-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--card-bg);
  border: 1px solid var(--gold-dark);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  color: var(--gold-mid);
}

.nk-option-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--card-title);
  margin-bottom: 3px;
  line-height: 1.2;
  font-family: var(--serif);
}

.nk-option-sub {
  font-size: 12px;
  font-style: italic;
  color: #BFB49E;
  line-height: 1.4;
  font-family: var(--serif);
}

/* ── List items (depth screen) ── */
.nk-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-radius: 12px;
  margin-bottom: 8px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  text-decoration: none;
  cursor: pointer;
}

.nk-list-item.featured {
  background: var(--dark-surf);
  border-color: rgba(232,184,74,0.18);
}

.nk-list-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--card-title);
  margin-bottom: 2px;
  font-family: var(--serif);
}

.nk-list-title.featured { color: var(--d-heading); }

.nk-list-sub {
  font-size: 12px;
  font-style: italic;
  color: var(--card-sub);
  font-family: var(--serif);
}

.nk-list-sub.featured { color: var(--d-meta); }

.nk-list-arrow {
  font-size: 14px;
  color: var(--gold-light);
  opacity: 0.6;
  flex-shrink: 0;
}

/* ── Featured quote ── */
.nk-featured {
  font-family: var(--serif);
  font-size: clamp(18px, 2.2vw, 22px);
  font-weight: 300;
  font-style: italic;
  color: var(--d-heading);
  line-height: 1.6;
  border-left: 2px solid var(--gold-light);
  padding: 8px 0 8px 24px;
  margin: 40px 0;
  max-width: 640px;
  opacity: 0.85;
}

/* ── Skip / secondary links ── */
.nk-skip {
  display: block;
  text-align: center;
  font-size: 12px;
  font-style: italic;
  color: var(--gold-light);
  margin-top: 14px;
  text-decoration: none;
  font-family: var(--serif);
}

.nk-footer-text {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--gold-light);
  font-family: var(--serif-sc);
}

/* ── Kit email form overrides ── */
.nk-kit-wrap .formkit-form {
  background: transparent !important;
}
.nk-kit-wrap .formkit-input {
  background: rgba(255,255,255,0.05) !important;
  border: 1px solid rgba(255,255,255,0.10) !important;
  border-radius: 10px !important;
  color: var(--d-heading) !important;
  font-family: var(--serif) !important;
  font-size: 15px !important;
  padding: 14px 16px !important;
}
.nk-kit-wrap .formkit-submit {
  background: var(--gold-light) !important;
  border: 1px solid var(--gold-dark) !important;
  border-radius: 10px !important;
  color: #1A0F00 !important;
  font-family: var(--serif-sc) !important;
  font-size: 11px !important;
  letter-spacing: 0.16em !important;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .nk-page { padding: 48px 20px 80px; }
  .nk-nav  { padding: 36px 20px 0; }
  .nk-h1   { font-size: clamp(32px, 8vw, 48px); }
}
</style>
